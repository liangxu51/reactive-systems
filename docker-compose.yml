version: '3'
services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  mongodb:
    container_name: mongo-db
    image: mongo:4.4
    command: [
      "mongod",
      "--replSet", "rs0",
      "--bind_ip_all",
      "--tlsMode", "preferTLS",
      "--tlsCertificateKeyFile", "/etc/mongod-tls/server-combined.pem",
      "--tlsCAFile", "/etc/mongod-tls/ca-cert.pem"
    ]
    volumes:
      - ~/mongo:/data/db
      - ./mongodb-certs/server-combined.pem:/etc/mongod-tls/server-combined.pem:ro
      - ./mongodb-certs/ca-cert.pem:/etc/mongod-tls/ca-cert.pem:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet
      interval: 5s
      timeout: 5s
      retries: 10
  mongo-init-replicaset:
    image: mongo:4.4
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    command: >
      mongo --host mongo-db --eval "
        if (rs.status().ok === 1) {
          print('replica set already initiated');
        } else {
          rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo-db:27017'}]});
        }
      "
  order-service:
    profiles: ["order-service"]
    build: ./order-service
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init-replicaset:
        condition: service_completed_successfully
  order-service-vt:
    profiles: ["order-service-vt"]
    build: ./order-service-vt
    ports:
      - "8080:8083"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init-replicaset:
        condition: service_completed_successfully
  inventory-service:
    build: ./inventory-service
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init-replicaset:
        condition: service_completed_successfully
  shipping-service:
    build: ./shipping-service
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init-replicaset:
        condition: service_completed_successfully