worker_processes  1;

events {
    worker_connections  1024;
}

http {
    server {
        listen 80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxied to the backend services by their docker-compose service name
        # instead of the browser calling a hardcoded localhost:PORT directly
        # (see ASSESSMENT.md tech debt #4). 127.0.0.11 is Docker's embedded
        # DNS server on every user-defined bridge network (what docker-compose
        # creates) - resolving via a variable + this resolver, rather than a
        # bare hostname in proxy_pass, means nginx looks the name up lazily
        # per-request instead of once at startup, so the frontend still starts
        # and serves the UI even if order-service/inventory-service aren't up
        # yet (order-service is opt-in via a compose profile).
        #
        # The Helm chart does NOT use this file - it mounts its own copy
        # (templates/frontend-nginx-configmap.yaml) with a cluster-appropriate
        # resolver, since Kubernetes' in-cluster DNS server has no fixed IP
        # like Docker's does. Keep both in sync when changing proxy behavior.
        resolver 127.0.0.11 valid=10s;

        location /api/orders {
            set $order_service order-service;
            proxy_pass http://$order_service:8080/api/orders;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            # GET /api/orders is streamed as text/event-stream (SSE); buffering
            # would hold events until nginx's buffer fills instead of forwarding
            # each one as it arrives.
            proxy_buffering off;
            proxy_read_timeout 1h;
        }

        location /api/products {
            set $inventory_service inventory-service;
            proxy_pass http://$inventory_service:8081/api/products;
        }
    }
}