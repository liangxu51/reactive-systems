name: Gemini PR Review

on:
  pull_request:
    types: [opened, reopened]

concurrency:
  group: gemini-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare prompt context
        run: |
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: "This repo is a Baeldung tutorial project demonstrating reactive, event-driven microservices (Spring WebFlux/Reactor, Kafka, MongoDB) plus a React frontend. Read CLAUDE.md at the repo root for architecture and conventions before reviewing. Do not flag scope creep as a blocker unless it adds unrelated code to the module."}' > .gemini/context.json
        env:
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}

      - name: Run Gemini pull request review
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_debug: true
          github_pr_number: ${{ github.event.pull_request.number }}
          settings: |
            {
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            ["https://github.com/gemini-cli-extensions/code-review"]
          prompt: '/pr-code-review'
