name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repo is a Baeldung tutorial project demonstrating reactive,
            event-driven microservices (Spring WebFlux/Reactor, Kafka, MongoDB)
            plus a React frontend. Read CLAUDE.md at the repo root for the
            project's architecture and conventions before reviewing.

            Perform a code review with the following focus areas:

            1. **Correctness**
               - Reactive chains (Mono/Flux) are not blocking and are properly subscribed
               - Kafka consumer error handling doesn't silently swallow failures
               - Saga/compensating-transaction logic stays consistent with the
                 OrderStatus contract shared across services

            2. **Security**
               - No new unauthenticated/unvalidated endpoints
               - No secrets or PII logged
               - Input validation at service boundaries

            3. **Code quality & style**
               - Follows existing patterns in the touched service rather than
                 introducing new abstractions
               - No unrelated scope creep (per CLAUDE.md: "do not add unrelated
                 code to this module")

            4. **Test coverage**
               - New business logic has corresponding unit/integration tests
               - Existing tests aren't weakened or deleted without justification

            Provide feedback using inline comments for specific issues, and a
            short top-level summary. Do not block on stylistic nitpicks alone.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
