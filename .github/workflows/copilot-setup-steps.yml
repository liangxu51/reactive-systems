name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Maven dependencies
        run: |
          mvn dependency:go-offline \
            -pl order-service,inventory-service,shipping-service \
            -DexcludeTransitive=false \
            || true

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Verify builds
        run: |
          # Verify Java services can be compiled
          mvn clean compile \
            -pl order-service,inventory-service,shipping-service \
            -DskipTests \
            || true
          
          # Verify frontend can build
          cd frontend
          npm run build || true
