# Default values target a local minikube cluster.
# Build the service images into minikube's own Docker daemon first, tagging
# them with this chart's appVersion (see Chart.yaml) rather than "latest":
#   eval $(minikube docker-env)
#   mvn clean package -pl order-service,inventory-service,shipping-service
#   TAG=$(grep '^appVersion' Chart.yaml | cut -d '"' -f2)
#   docker build -t order-service:$TAG order-service
#   docker build -t inventory-service:$TAG inventory-service
#   docker build -t shipping-service:$TAG shipping-service
#   (cd frontend && npm ci && npm run build) && docker build -t frontend:$TAG frontend
#
# imagePullPolicy stays IfNotPresent (no registry backs these images, so
# Always would just fail trying to pull them) - bump appVersion in Chart.yaml
# before each rebuild instead, so every image gets a unique tag and nodes
# never serve a stale cached image. Per-service image.tag below defaults to
# appVersion when left blank; override it (e.g. --set orderService.image.tag=foo)
# for an ad hoc build without bumping the chart version.
imagePullPolicy: IfNotPresent

mongodb:
  image: mongo:4.4
  # Matches the hostname baked into application-docker.properties.
  serviceName: mongo-db
  port: 27017
  # 3 voting members so the replica set has a real majority (2) and survives
  # losing any one pod - see mongodb.yaml/mongo-init-replicaset.yaml.
  replicaCount: 3
  persistence:
    enabled: true
    size: 1Gi
  # WiredTiger's default cache is (RAM - 1GB) / 2, so the memory limit needs
  # headroom above the cache or mongod risks an OOM kill under load.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

zookeeper:
  image: confluentinc/cp-zookeeper:latest
  serviceName: zookeeper
  clientPort: 2181
  tickTime: 2000

kafka:
  image: confluentinc/cp-kafka:7.4.0
  # Matches the hostname baked into application-docker.properties.
  serviceName: kafka-broker
  port: 9092
  brokerId: 1
  offsetsTopicReplicationFactor: 1

orderService:
  enabled: true
  image:
    repository: order-service
    tag: ""
  containerPort: 8080
  servicePort: 8080
  replicaCount: 1

# Virtual-thread variant of order-service (see order-service-vt module).
# Mutually exclusive with orderService: both would consume/produce on the
# same Kafka topic and Mongo collection, mirroring the docker-compose
# profiles "order-service" / "order-service-vt".
orderServiceVt:
  enabled: false
  image:
    repository: order-service-vt
    tag: ""
  containerPort: 8083
  servicePort: 8080
  replicaCount: 1

inventoryService:
  image:
    repository: inventory-service
    tag: ""
  containerPort: 8081
  servicePort: 8081
  replicaCount: 1

shippingService:
  image:
    repository: shipping-service
    tag: ""
  replicaCount: 1

frontend:
  image:
    repository: frontend
    tag: ""
  containerPort: 80
  servicePort: 80
  replicaCount: 1
  service:
    # NodePort so `minikube service frontend` can open it from the host.
    type: NodePort
  # ClusterIP of the in-cluster DNS server, used by nginx to resolve
  # order-service/inventory-service when proxying /api/* (see
  # templates/frontend-nginx-configmap.yaml). 10.96.0.10 is CoreDNS's address
  # on a stock minikube install (kubeadm's default 10.96.0.0/12 service CIDR).
  # If your cluster differs, override with:
  #   --set frontend.dnsResolverIP=$(kubectl get svc kube-dns -n kube-system -o jsonpath='{.spec.clusterIP}')
  dnsResolverIP: "10.96.0.10"
