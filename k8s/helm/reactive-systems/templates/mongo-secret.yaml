# Passwords and the replica-set keyfile are generated once (not committed
# to values.yaml) and persisted across `helm upgrade` via `lookup` - without
# this, every upgrade would mint new random values, locking out the users
# already provisioned in Mongo's data files by the mongo-init sidecar in
# mongodb.yaml.
{{- $existing := lookup "v1" "Secret" .Release.Namespace "mongo-credentials" }}
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  labels:
    {{- include "reactive-systems.labels" . | nindent 4 }}
type: Opaque
data:
  root-password: {{ or (dig "data" "root-password" "" $existing) (randAlphaNum 32 | b64enc) }}
  app-password: {{ or (dig "data" "app-password" "" $existing) (randAlphaNum 32 | b64enc) }}
  # Internal auth between replica-set members - MongoDB requires the same
  # keyfile content on every mongod in the set (see mongodb.yaml).
  keyfile: {{ or (dig "data" "keyfile" "" $existing) (randAlphaNum 756 | b64enc) }}
