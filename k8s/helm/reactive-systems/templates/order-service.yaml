{{- if .Values.orderService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orderService.replicaCount }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        - name: wait-for-mongo-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.mongodb.serviceName }} {{ .Values.mongodb.port }} && nc -z {{ .Values.kafka.serviceName }} {{ .Values.kafka.port }}; do
                echo waiting for mongo-db and kafka-broker; sleep 2;
              done
      containers:
        - name: order-service
          image: "{{ .Values.orderService.image.repository }}:{{ .Values.orderService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            {{- include "reactive-systems.mongoUriEnv" . | nindent 12 }}
            {{- include "reactive-systems.apiAuthEnv" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.orderService.containerPort }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.orderService.containerPort }}
            initialDelaySeconds: 15
          livenessProbe:
            tcpSocket:
              port: {{ .Values.orderService.containerPort }}
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  labels:
    app: order-service
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.orderService.servicePort }}
      targetPort: {{ .Values.orderService.containerPort }}
{{- end }}
