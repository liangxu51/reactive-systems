{{- if .Values.mongodb.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-db-data
  labels:
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-db
  labels:
    app: mongo-db
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.mongodb.serviceName }}
  replicas: 1
  selector:
    matchLabels:
      app: mongo-db
  template:
    metadata:
      labels:
        app: mongo-db
    spec:
      containers:
        - name: mongo-db
          image: {{ .Values.mongodb.image }}
          # inventory-service uses reactive MongoDB transactions, which
          # only work against a replica set - see mongo-init-replicaset.yaml
          # for the one-time rs.initiate() that turns this single node into
          # a (single-member) replica set named rs0. The member host is the
          # StatefulSet pod's stable per-pod DNS name (mongo-db-0.<headless
          # service>...), not the Service name itself: a ClusterIP is a
          # virtual address never bound to a real interface inside the pod
          # (so mongod can never self-match against it), and a raw pod IP
          # changes on every restart. The per-pod DNS name from the headless
          # Service below is the only identity that is both self-resolvable
          # and stable across restarts.
          command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
      volumes:
        - name: data
          {{- if .Values.mongodb.persistence.enabled }}
          persistentVolumeClaim:
            claimName: mongo-db-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongodb.serviceName }}
  labels:
    app: mongo-db
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  # Headless (clusterIP: None): required for a StatefulSet to give each pod
  # its own stable per-pod DNS name (mongo-db-0.mongo-db...) instead of
  # load-balancing behind one virtual ClusterIP.
  clusterIP: None
  selector:
    app: mongo-db
  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: 27017
