apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  labels:
    app: shipping-service
    {{- include "reactive-systems.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.shippingService.replicaCount }}
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
    spec:
      initContainers:
        - name: wait-for-mongo-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.mongodb.serviceName }} {{ .Values.mongodb.port }} && nc -z {{ .Values.kafka.serviceName }} {{ .Values.kafka.port }}; do
                echo waiting for mongo-db and kafka-broker; sleep 2;
              done
      containers:
        # No Service/ports/probes: shipping-service has no
        # spring-boot-starter-webflux dependency, so it never opens an
        # HTTP port - it's purely a Kafka consumer/producer.
        - name: shipping-service
          image: "{{ .Values.shippingService.image.repository }}:{{ .Values.shippingService.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
