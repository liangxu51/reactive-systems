# Password generated once (not committed to values.yaml) and persisted
# across `helm upgrade` via `lookup` - without this, every upgrade would
# mint a new random password, silently invalidating any credential already
# handed out. Same pattern as mongo-secret.yaml, applied to the shared HTTP
# Basic API credential (SEC-001, PR #72).
{{- $existing := lookup "v1" "Secret" .Release.Namespace "api-credentials" }}
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  labels:
    {{- include "reactive-systems.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ or (dig "data" "password" "" $existing) (randAlphaNum 32 | b64enc) }}
